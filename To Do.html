        .main-container {
            display: grid;
            grid-template-columns: 320px 320px minmax(0, 1fr);
            gap: 20px;
            height: 100vh;
            padding: 1.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .panel {
            min-width: 0;
            border-radius: var(--border-radius-lg);
            border: 1px solid rgba(255,255,255,0.55);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            height: 100%;
        }

        .panel:hover {
            border-color: rgba(255,255,255,0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        .panel-header {
            padding: 1.5rem;
            border-bottom: 2px solid rgba(102, 126, 234, 0.1);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            position: relative;
        }

        .panel-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            position: relative;
        }

        .add-input-group {
            display: flex;
            gap: 8px;
            padding: 0.5rem;
            position: relative;
            z-index: 1;
            flex-direction: column;
        }

        .add-input-group .input-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .add-input-group input {
            min-width: 0;
            flex: 1;
            padding: 10px 14px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: var(--border-radius-md);
            font-size: 14px;
            background: rgba(255,255,255,0.9);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .add-input-group button {
            min-width: 96px;
            flex: 0 0 auto;
        }

        .add-input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .add-input-group button {
            padding: 10px 16px;
            background: rgba(255,255,255,0.92);
            color: #2f3b72;
            border: 1px solid rgba(102,126,234,0.45);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.25s ease;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            white-space: nowrap;
        }

        .add-input-group button:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .list-stats {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            margin-right: 8px;
        }
        .list-count-total,
        .list-count-pending {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 38px;
            text-align: center;
        }
        .list-count-total {
            background: rgba(79, 172, 254, 0.1);
            color: #2c3e50;
            border: 1px solid rgba(79, 172, 254, 0.2);
        }
        .list-count-pending {
            background: rgba(245, 87, 108, 0.1);
            color: #c0392b;
            border: 1px solid rgba(245, 87, 108, 0.2);
        }

        .folder-item {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            font-size: 14px;
            position: relative;
        }

        .folder-item:hover { background: rgba(102, 126, 234, 0.08); }

        .folder-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-left: 4px solid #667eea;
            padding-left: 12px;
            font-weight: 600;
            color: #667eea;
            box-shadow: inset 0 0 10px rgba(102, 126, 234, 0.1);
        }

        .folder-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .folder-stats {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            margin-right: 4px;
        }

        .folder-stats .list-count-total,
        .folder-stats .list-count-pending {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 38px;
            text-align: center;
        }

        .list-item {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(79, 172, 254, 0.1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            font-size: 14px;
            position: relative;
        }

        .list-item:hover { background: rgba(79, 172, 254, 0.08); }

        .list-item.active {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.2) 0%, rgba(0, 242, 254, 0.2) 100%);
            border-left: 4px solid #4facfe;
            padding-left: 12px;
            font-weight: 600;
            color: #4facfe;
            box-shadow: inset 0 0 10px rgba(79, 172, 254, 0.1);
        }

        .list-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-state {
            padding: 3rem 2rem;
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-state::before {
            content: '📋';
            font-size: 48px;
            opacity: 0.5;
        }

        .task-card {
            margin: 0.4rem 0.65rem;
            padding: 0.55rem 0.75rem;
            background: rgba(255,255,255,0.9);
            border-radius: var(--border-radius-lg);
            border: 2px solid rgba(245, 87, 108, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            position: relative;
            box-sizing: border-box;
            max-width: calc(100% - 1.3rem);
        }

        .task-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--gradient-secondary);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(245, 87, 108, 0.3);
        }

        .task-card:hover::before { opacity: 1; }

        .task-card.completed {
            opacity: 0.7;
            background: rgba(220, 255, 220, 0.9);
        }
        .task-card.completed::before {
            background: var(--gradient-success);
            opacity: 1;
        }

        .task-top-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 28px;
        }

        .task-checkbox {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #f5576c;
            transition: transform 0.2s ease;
        }
        .task-checkbox:hover { transform: scale(1.1); }

        .task-text {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-primary);
            word-break: break-word;
            line-height: 1.35;
        }
        .task-card.completed .task-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .task-date-top {
            font-size: 10px;
            color: #27ae60;
            font-weight: 500;
            background: rgba(39, 174, 96, 0.1);
            padding: 1px 6px;
            border-radius: 8px;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .task-date-top:hover { background: rgba(39, 174, 96, 0.18); }

        .task-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .task-card:hover .task-actions { opacity: 1; }

        .task-edit, .task-delete {
            padding: 3px 7px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: var(--color-text-secondary);
            border-radius: var(--border-radius-md);
            transition: all 0.2s ease;
            line-height: 1;
        }
        .task-edit:hover  { color: #3498db; background: rgba(52,152,219,0.1); }
        .task-delete:hover{ color: #e74c3c; background: rgba(231,76,60,0.1); }

        .task-notes-section { margin-top: 0.4rem; }
        .task-notes-section.hidden { display: none; }

        .task-notes-input {
            display: block;
            width: 100%;
            padding: 6px 10px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: var(--border-radius-md);
            font-size: 13px;
            color: var(--color-text-primary);
            background: rgba(248,248,255,0.95);
            font-family: inherit;
            box-sizing: border-box;
            resize: vertical;
            line-height: 1.5;
            transition: all 0.3s ease;
        }
        .task-notes-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.1);
        }

        .task-meta {
            display: none;
            align-items: center;
            justify-content: flex-end;
            font-size: 11px;
            color: var(--color-text-secondary);
            margin-top: 0.35rem;
            padding-top: 0.35rem;
            border-top: 1px solid rgba(245, 87, 108, 0.12);
        }
        .task-meta.visible { display: flex; }

        .task-time {
            font-size: 11px;
            color: #27ae60;
            font-weight: 500;
        }

        .task-add-section {
            padding: 1.5rem;
            border-top: 1px solid rgba(102,126,234,0.18);
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255,255,255,0.92);
        }

        .task-add-row,
        .task-option-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .task-option-row {
            grid-template-columns: minmax(0, 1fr) auto auto;
        }

        .task-add-row input,
        .task-option-row select {
            width: 100%;
            min-width: 0;
            padding: 12px 16px;

<script>
class HierarchicalTaskManager {
    constructor() { 
        this.folders = []; 
        this.selectedFolderId = null; 
        this.selectedListId = null; 
        this.currentTaskView = 'all'; 
        this.reports = { daily: [], monthly: [] }; 
        this.taskOptions = []; 
        this.templates = []; 
        this.load(); 
        this.migrateOldTasks();
        this.refreshAllReports();
        this.render(); 
        this.initAutoRefresh(); 
    }
    migrateOldTasks() {
        const today = new Date().toISOString().split('T')[0];
        this.folders.forEach(folder => {
            folder.lists.forEach(list => {
                list.tasks.forEach(task => {
                    if (task.completed && !task.completedDate) {
                        task.completedDate = task.createdDate || today;
                    }
                });
            });
        });
        this.save();
    }
    load() { 
        const stored = localStorage.getItem('hierarchicalTasks'); 
        if(stored) try{ this.folders = JSON.parse(stored); }catch(e){} 
        const taskOptionsStored = localStorage.getItem('taskOptions'); 
        if(taskOptionsStored) try{ this.taskOptions = JSON.parse(taskOptionsStored); }catch(e){} 
        else this.taskOptions = ['写日报', '开会', '学习', '锻炼'];

    save() { 
        localStorage.setItem('hierarchicalTasks', JSON.stringify(this.folders)); 
        localStorage.setItem('taskOptions', JSON.stringify(this.taskOptions)); 
        localStorage.setItem('listTemplates', JSON.stringify(this.templates)); 
    }
    refreshAllReports() {
        const dailyMap = new Map();
        for (const folder of this.folders) {
            for (const list of folder.lists) {
                for (const task of list.tasks) {
                    if (task.completed && task.completedDate) {
                        const date = task.completedDate;
                        if (!dailyMap.has(date)) dailyMap.set(date, []);
                        dailyMap.get(date).push({
                            folderName: folder.name,
                            listName: list.name,
                            text: task.text,
                            completedAt: task.completedAt || '',
                            createdDate: task.createdDate
                        });
                    }
                }
            }
        }
        const newDaily = [];
        for (const [date, entries] of dailyMap.entries()) {
            newDaily.push({ date, timestamp: new Date().toISOString(), summary: { totalTasks: entries.length, completedTasks: entries.length }, taskEntries: entries });
        }
        this.reports.daily = newDaily;
        const monthlyMap = new Map();
        for (const daily of this.reports.daily) {
            const month = daily.date.substring(0,7);
            if (!monthlyMap.has(month)) monthlyMap.set(month, []);
            monthlyMap.get(month).push(daily);
        }
        const newMonthly = [];
        for (const [month, dailies] of monthlyMap.entries()) {
            const totalCompleted = dailies.reduce((s,r)=>s+r.summary.completedTasks,0);
            const avgRate = dailies.length ? Math.round(dailies.reduce((s,r)=> s + (r.summary.completedTasks || 0),0) / dailies.length) : 0;
            newMonthly.push({ month, timestamp: new Date().toISOString(), days: dailies.length, summary: { totalCompletedTasks: totalCompleted, avgCompletionRate: avgRate }, dailyReports: dailies });
        }
        this.reports.monthly = newMonthly;
        this.save();
        if (this.currentTaskView === 'reports') this.renderReports();
    }
    addFolder() { const input = document.getElementById('folderInput'); const name = input.value.trim(); if(!name) return; if(this.folders.some(f=>f.name===name)){ alert('该项目已存在'); return; } this.folders.push({ id: Date.now(), name: name, lists: [] }); input.value = ''; this.save(); this.render(); }

    toggleTask(taskId) { 
        const folder = this.folders.find(f=>f.id===this.selectedFolderId); 
        if(!folder) return; 
        const list = folder.lists.find(l=>l.id===this.selectedListId); 
        if(!list) return; 
        const task = list.tasks.find(t=>t.id===taskId); 
        if(task){ 
            task.completed = !task.completed; 
            if (task.completed) { 
                const now = new Date(); 
                task.completedAt = now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}); 
                task.completedDate = now.toISOString().split('T')[0]; 
            } else { 
                task.completedAt = null; 
                task.completedDate = null; 
            } 
            this.save(); 
            this.renderTasks(); 
            this.refreshAllReports(); 
        } 
    }

    switchTaskView(view) { this.currentTaskView = view; const btns = document.querySelectorAll('.tab-btn'); const tabs = document.querySelectorAll('.tab-content'); btns.forEach(btn=>btn.classList.remove('active')); if(event && event.target) event.target.classList.add('active'); else btns[1].classList.add('active'); tabs.forEach(tab=>tab.classList.remove('active')); if(view==='notes'){ document.getElementById('notesTab').classList.add('active'); document.getElementById('taskAddSection').style.display='none'; document.getElementById('statsBar').style.display='none'; this.renderNotes(); } else if(view==='all'){ document.getElementById('allTasks').classList.add('active'); document.getElementById('taskAddSection').style.display='flex'; document.getElementById('statsBar').style.display='grid'; } else if(view==='pending'){ document.getElementById('pendingTasks').classList.add('active'); document.getElementById('taskAddSection').style.display='flex'; document.getElementById('statsBar').style.display='grid'; } else if(view==='completed'){ document.getElementById('completedTasks').classList.add('active'); document.getElementById('taskAddSection').style.display='flex'; document.getElementById('statsBar').style.display='grid'; } else if(view==='reports'){ document.getElementById('reportsTab').classList.add('active'); document.getElementById('taskAddSection').style.display='none'; document.getElementById('statsBar').style.display='none'; this.renderReports(); } this.renderTasks(); }

    renderFolders() {

                if(completedTasks < totalTasks) incompleteLists++;
            }

                    </div>`;
        }).join('');
    }

    copyTextFromArea(){ if(window.currentCopyTextarea && window.currentCopyTextarea.value){ navigator.clipboard.writeText(window.currentCopyTextarea.value).then(()=>alert('已复制')).catch(()=>alert('复制失败')); } else alert('无内容可复制'); }
    closeModal(el){ const modal=el.closest('.report-detail-modal'); if(modal) modal.remove(); }
    showCalendarModal(){ const modal=document.createElement('div'); modal.className='calendar-modal-overlay'; const yy=this.currentCalendarDate?.getFullYear()||new Date().getFullYear(); const mm=this.currentCalendarDate?.getMonth()||new Date().getMonth(); const first=new Date(yy,mm,1); let cur=new Date(first); cur.setDate(cur.getDate()-first.getDay()); let daysHtml=''; for(let i=0;i<42;i++){ const isCurMonth=cur.getMonth()===mm; const dateStr=cur.toISOString().split('T')[0]; const hasReport=this.reports.daily.some(r=>r.date===dateStr); daysHtml+=`<div class="calendar-popup-day ${isCurMonth?(hasReport?'has-report':''):'empty'}" onclick="${isCurMonth?`manager.showDailyReportModal('${dateStr}');manager.closeCalendarModal();`:''}">${cur.getDate()}</div>`; cur.setDate(cur.getDate()+1); } modal.innerHTML=`<div class="calendar-modal-card"><div class="calendar-modal-header"><h2>📅 ${yy}年${mm+1}月</h2><button onclick="manager.closeCalendarModal()">关闭</button></div><div class="calendar-popup-grid">${['日','一','二','三','四','五','六'].map(d=>`<div class="calendar-popup-weekday">${d}</div>`).join('')}${daysHtml}</div></div>`; document.body.appendChild(modal); }
    closeCalendarModal(){ const modal=document.querySelector('.calendar-modal-overlay'); if(modal) modal.remove(); }
    initAutoRefresh(){ setInterval(()=>{ this.refreshAllReports(); if(this.currentTaskView==='reports') this.renderReports(); }, 60000); }
    renderTemplateBar(){ const bar=document.getElementById('templateUseBar'); const chips=document.getElementById('templateChips'); if(!this.selectedFolderId||this.templates.length===0){ bar.style.display='none'; return; } bar.style.display='block'; chips.innerHTML=this.templates.map(t=>`<button class="template-chip" onclick="manager.applyTemplate(${t.id})">${this.escape(t.name)}</button>`).join('')+'<button class="template-manage-btn" onclick="manager.openTemplateModal()">⚙️ 管理</button>'; }
    applyTemplate(templateId){ if(!this.selectedFolderId) return; const tpl=this.templates.find(t=>t.id===templateId); if(!tpl) return; const folder=this.folders.find(f=>f.id===this.selectedFolderId); let base=tpl.name,candidate=base,counter=2; while(folder.lists.some(l=>l.name===candidate)) candidate=`${base} (${counter++})`; const newList={id:Date.now(),name:candidate,notes:'',tasks:tpl.tasks.map((taskName,i)=>{ let finalText = (taskName && taskName.trim() !== '' && taskName !== '新任务') ? taskName : '新任务'; return {id:Date.now()+i+1,text:finalText,completed:false,completedAt:null,completedDate:null,createdDate:new Date().toISOString().split('T')[0],notes:''}; })}; folder.lists.push(newList); this.save(); this.renderLists(); this.selectList(newList.id); this.refreshAllReports(); }
    openTemplateModal(){ 
        // 打开前先同步当前模板数据
        if(this._editingTemplateId) this.syncTemplateTasksFromDOM();
        document.getElementById('templateModalOverlay').style.display='flex'; 
        this._editingTemplateId=null; 
        this.renderTemplateListPane(); 
        document.getElementById('templateEditPane').innerHTML='<div style="padding:20px;text-align:center;color:#999;">✨ 选择左侧模板开始编辑</div>'; 
    }
    closeTemplateModal(){ 
        if(this._editingTemplateId) this.syncTemplateTasksFromDOM();
        document.getElementById('templateModalOverlay').style.display='none'; 
        this.renderTemplateBar(); 
    }
    syncTemplateTasksFromDOM(){
        if(!this._editingTemplateId) return;
        const tpl = this.templates.find(t=>t.id===this._editingTemplateId);
        if(!tpl) return;
        const pane = document.getElementById('templateEditPane');
        if(!pane) return;
        const rows = pane.querySelectorAll('.template-task-row input');
        for(let i=0; i<rows.length && i<tpl.tasks.length; i++){
            let val = rows[i].value.trim();
            if(val === '') val = '新任务';
            if(tpl.tasks[i] !== val){
                tpl.tasks[i] = val;
            }
        }
        this.save();
    }
    renderTemplateListPane(){ 
        const container=document.getElementById('templateListItems'); 
        if(!container) return; 
        if(this.templates.length===0){ 
            container.innerHTML='<div style="padding:12px;">暂无模板，请在下方新建</div><div style="padding:10px;"><input id="newTemplateName" placeholder="模板名称" style="padding:6px;border-radius:30px;border:1px solid #ddd;"><button class="template-add-btn" onclick="manager.addTemplate()">添加</button></div>'; 
            return; 
        } 
        container.innerHTML=this.templates.map(t=>`<div class="template-item ${this._editingTemplateId===t.id?'active':''}" onclick="manager.selectTemplate(${t.id})"><span>${this.escape(t.name)}</span><button onclick="event.stopPropagation();manager.deleteTemplate(${t.id})">✕</button></div>`).join('')+'<div style="padding:10px;"><input id="newTemplateName" placeholder="新模板名称" style="padding:6px;border-radius:30px;border:1px solid #ddd;"><button class="template-add-btn" onclick="manager.addTemplate()">添加</button></div>'; 
    }
    addTemplate(){ const input=document.getElementById('newTemplateName'); const name=input.value.trim(); if(!name) return; this.templates.push({id:Date.now(),name:name,tasks:[]}); this.save(); this.renderTemplateListPane(); this.selectTemplate(this.templates[this.templates.length-1].id); }
    deleteTemplate(tid){ 
        if(this._editingTemplateId===tid) this.syncTemplateTasksFromDOM();
        this.templates=this.templates.filter(t=>t.id!==tid); 
        if(this._editingTemplateId===tid) this._editingTemplateId=null; 
        this.save(); 
        this.renderTemplateListPane(); 
        if(this._editingTemplateId===null) document.getElementById('templateEditPane').innerHTML='<div style="padding:20px;text-align:center;color:#999;">选择左侧模板</div>'; 
    }
    selectTemplate(tid){ 
        if(this._editingTemplateId) this.syncTemplateTasksFromDOM();
        this._editingTemplateId=tid; 
        this.renderTemplateListPane(); 
        this.renderTemplateEditPane(); 
    }
    renderTemplateEditPane(){ 
        const tpl=this.templates.find(t=>t.id===this._editingTemplateId); 
        const pane=document.getElementById('templateEditPane'); 
        if(!tpl||!pane) return; 
        const tasksHtml=tpl.tasks.map((task,i)=> {
            let displayVal = task;
            let placeholderText = '';
            if (task === '新任务' || task === '') {
                displayVal = '';
                placeholderText = '新任务';
            }
            return `<div class="template-task-row"><input type="text" value="${this.escape(displayVal)}" placeholder="${this.escape(placeholderText)}" onchange="manager.updateTemplateTask(${tpl.id},${i},this.value)" /><button onclick="manager.removeTemplateTask(${tpl.id},${i})">✕</button></div>`;
        }).join('');
        pane.innerHTML=`<input class="template-name-input" value="${this.escape(tpl.name)}" onchange="manager.updateTemplateName(${tpl.id},this.value)" /><div class="template-tasks-list">${tasksHtml}</div><button class="template-add-task-btn" onclick="manager.addTemplateTask(${tpl.id})">➕ 添加任务</button>`;
        // 重新绑定后, 无需额外操作
    }
    updateTemplateName(tid,name){ 
        if(this._editingTemplateId === tid) this.syncTemplateTasksFromDOM();
        const tpl=this.templates.find(t=>t.id===tid); 
        if(tpl&&name.trim()) tpl.name=name.trim(); 
        this.save(); 
        this.renderTemplateListPane(); 
    }
    addTemplateTask(tid){ 
        // 添加新任务前，先同步当前所有未保存的输入内容
        if(this._editingTemplateId === tid) this.syncTemplateTasksFromDOM();
        const tpl=this.templates.find(t=>t.id===tid); 
        if(tpl){ 
            tpl.tasks.push(''); 
            this.save(); 
            this.renderTemplateEditPane();
            // 自动聚焦到新添加的输入框
            setTimeout(()=>{
                const pane = document.getElementById('templateEditPane');
                if(pane){
                    const lastInput = pane.querySelector('.template-task-row:last-child input');
                    if(lastInput) lastInput.focus();
                }
            }, 30);
        } 
    }
    updateTemplateTask(tid,idx,val){ 
        const tpl=this.templates.find(t=>t.id===tid); 
        if(tpl && tpl.tasks[idx]) { 
            let newVal = val.trim();
            if (newVal === '') newVal = '新任务';
            tpl.tasks[idx] = newVal;
            this.save(); 
            // 仅更新当前行显示，不重新渲染整个面板，避免丢失焦点
            const pane = document.getElementById('templateEditPane');
            if(pane){
                const rows = pane.querySelectorAll('.template-task-row input');
                if(rows[idx] && rows[idx].value !== newVal){
                    rows[idx].value = newVal;
                }
            }
        } 
    }
    removeTemplateTask(tid,idx){ 
        if(this._editingTemplateId === tid) this.syncTemplateTasksFromDOM();
        const tpl=this.templates.find(t=>t.id===tid); 
        if(tpl) tpl.tasks.splice(idx,1); 
        this.save(); 
        this.renderTemplateEditPane(); 
    }
    escape(str){ if(typeof str!=='string') return str; return str.replace(/[&<>]/g,function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }
}
const manager = new HierarchicalTaskManager();
document.addEventListener('click',()=>manager.hideContextMenu());
document.getElementById('folderInput').addEventListener('keypress',e=>{if(e.key==='Enter') manager.addFolder();});
document.getElementById('listInput').addEventListener('keypress',e=>{if(e.key==='Enter') manager.addList();});
document.getElementById('taskInput').addEventListener('keypress',e=>{if(e.key==='Enter') manager.addTask();});
</script>
