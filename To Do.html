<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队任务管理系统（云端实时互通）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system}
body{background:#f7f8fa}
.login{position:fixed;inset:0;background:#fff;display:grid;place-items:center;z-index:100}
.login-card{background:#fff;border-radius:18px;padding:32px;width:min(400px,90vw);box-shadow:0 10px 40px rgba(0,0,0,.06)}
.login-title{font-size:20px;font-weight:600;margin-bottom:20px;text-align:center}
.role-bar{display:flex;gap:10px;margin-bottom:16px}
.role{flex:1;padding:10px;text-align:center;border:1px solid #e5e7eb;border-radius:10px;cursor:pointer}
.role.active{background:#eff6ff;border-color:#3b82f6}
input{width:100%;padding:12px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:12px}
button{background:#3b82f6;color:white;border:none;border-radius:10px;padding:12px;font-weight:500;cursor:pointer}
.login-btn{width:100%}
.main{display:grid;grid-template-columns:300px 300px 1fr;gap:16px;padding:16px;max-width:1400px;margin:0 auto}
@media(max-width:1024px){.main{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.main{grid-template-columns:1fr}}
.panel{background:white;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.04);display:flex;flex-direction:column}
.panel-h{padding:16px;border-bottom:1px solid #f3f4f6}
.panel-title{font-size:16px;font-weight:600;margin-bottom:10px}
.add-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.add-row input{flex:1;min-width:100px;padding:8px}
.add-row button{padding:8px 12px;white-space:nowrap}
.panel-body{flex:1;padding:10px;overflow-y:auto;min-height:300px}
.item{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:4px}
.item:hover{background:#f9fafb}
.item.active{background:#eff6ff;font-weight:500}
.tab-bar{display:flex;gap:8px;padding:12px;border-bottom:1px solid #f3f4f6}
.tab{padding:6px 12px;border-radius:8px;cursor:pointer}
.tab.active{background:#eff6ff;font-weight:500}
.tab-body{display:none;padding:10px;overflow-y:auto;flex:1}
.tab-body.active{display:block}
.task-card{background:#f9fafb;border-radius:12px;padding:12px;margin-bottom:8px}
.task-top{display:flex;align-items:center;gap:8px}
.task-text{flex:1}
.task-note{margin-top:8px;padding:8px;background:white;border-left:3px solid #3b82f6;border-radius:8px;font-size:14px;color:#555}
.task-to{color:#3b82f6;font-size:13px;margin-top:4px}
.emp-view .panel:nth-child(1),.emp-view .panel:nth-child(2){display:none}
.emp-view .main{grid-template-columns:1fr}
.emp-title{padding:20px;text-align:center;font-size:18px;font-weight:600}
.context{position:fixed;background:white;border-radius:10px;box-shadow:0 5px 25px rgba(0,0,0,.1);z-index:999;min-width:150px}
.context-item{padding:10px 14px;cursor:pointer}
.context-item:hover{background:#f9fafb}
</style>
</head>

<body>

<div class="login" id="loginBox">
  <div class="login-card">
    <div class="login-title">团队任务管理系统</div>
    <div class="role-bar">
      <div class="role active" role="admin">负责人</div>
      <div class="role" role="user">员工</div>
    </div>
    <input id="user" placeholder="用户名">
    <input id="pwd" placeholder="密码" type="password">
    <button class="login-btn" onclick="goLogin()">登录</button>
  </div>
</div>

<div id="ctxMenu" class="context" style="display:none"></div>

<div class="main">
  <div class="panel">
    <div class="panel-h">
      <div class="panel-title">📁 项目</div>
      <div class="add-row">
        <input id="projName" placeholder="项目名称">
        <button onclick="addProject()">新建</button>
      </div>
    </div>
    <div class="panel-body" id="projectList"></div>
  </div>

  <div class="panel">
    <div class="panel-h">
      <div class="panel-title">📋 任务列表</div>
      <div class="add-row">
        <input id="listName" placeholder="列表名称">
        <button onclick="addList()">新建</button>
      </div>
    </div>
    <div class="panel-body" id="listBox"></div>
  </div>

  <div class="panel">
    <div class="tab-bar">
      <div class="tab active" onclick="showTab('all')">全部</div>
      <div class="tab" onclick="showTab('undo')">待办</div>
      <div class="tab" onclick="showTab('done')">已完成</div>
    </div>
    <div class="tab-body active" id="allTask"></div>
    <div class="tab-body" id="undoTask"></div>
    <div class="tab-body" id="doneTask"></div>
    <div class="add-row" style="padding:12px">
      <input id="taskText" placeholder="任务内容" style="flex:2">
      <input id="taskNote" placeholder="备注" style="flex:2">
      <select id="assignTo"></select>
      <button onclick="addTask()">添加任务</button>
    </div>
  </div>
</div>

<script>
// 免费云端实时库（稳定、公开、适合小团队）
const API = "https://api.jsonbase.com/v1/stores/team-task-2025";
let user = { role: "", name: "" };
let currentProj = null;
let currentList = null;

// 登录
document.querySelectorAll('.role').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.role').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
  };
});

function goLogin() {
  const name = document.getElementById('user').value.trim();
  const pwd = document.getElementById('pwd').value.trim();
  const role = document.querySelector('.role.active').getAttribute('role');

  if (!name) return alert('请输入用户名');
  if (role === 'admin' && !(name === 'admin' && pwd === '123456')) return alert('管理员账号或密码错误');

  user = { role, name };
  document.getElementById('loginBox').style.display = 'none';
  if (role === 'admin') {
    loadProjects();
    loadUserSelect();
  } else {
    document.body.classList.add('emp-view');
    loadMyTasks();
  }
}

// 工具：请求云端
async function api(method, path, data) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: data ? JSON.stringify(data) : undefined
  });
  return await res.json();
}

// 项目
async function loadProjects() {
  const d = await api('GET', '/projects', null);
  const list = d || [];
  const dom = document.getElementById('projectList');
  dom.innerHTML = list.map(p => `
    <div class="item ${currentProj === p.id ? 'active' : ''}" onclick="selProject(${p.id})">${p.name}</div>
  `).join('') || '<div style="padding:10px">暂无项目</div>';
}

async function addProject() {
  const name = document.getElementById('projName').value.trim();
  if (!name) return;
  await api('POST', '/projects', { id: Date.now(), name });
  document.getElementById('projName').value = '';
  loadProjects();
}

function selProject(id) {
  currentProj = id;
  currentList = null;
  loadLists();
  renderTasks();
}

// 列表
async function loadLists() {
  const d = await api('GET', '/lists', null);
  const all = d || [];
  const list = all.filter(x => x.projId === currentProj);
  const dom = document.getElementById('listBox');
  dom.innerHTML = list.map(l => `
    <div class="item ${currentList === l.id ? 'active' : ''}" onclick="selList(${l.id})">${l.name}</div>
  `).join('') || '<div style="padding:10px">请先选择项目</div>';
}

async function addList() {
  const name = document.getElementById('listName').value.trim();
  if (!name || !currentProj) return;
  await api('POST', '/lists', { id: Date.now(), projId: currentProj, name });
  document.getElementById('listName').value = '';
  loadLists();
}

function selList(id) {
  currentList = id;
  renderTasks();
}

// 任务
async function renderTasks() {
  if (!currentList) return;
  const d = await api('GET', '/tasks', null);
  const all = d || [];
  const tasks = all.filter(t => t.listId === currentList);

  const card = t => `
  <div class="task-card" oncontextmenu="showCtx(event,${t.id})">
    <div class="task-top">
      <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id},this.checked)">
      <div class="task-text">
        ${t.text}
        ${t.to ? `<div class="task-to">指派：${t.to}</div>` : ''}
        ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
      </div>
    </div>
  </div>`;

  document.getElementById('allTask').innerHTML = tasks.map(card).join('');
  document.getElementById('undoTask').innerHTML = tasks.filter(x => !x.done).map(card).join('');
  document.getElementById('doneTask').innerHTML = tasks.filter(x => x.done).map(card).join('');
}

async function addTask() {
  const text = document.getElementById('taskText').value.trim();
  const note = document.getElementById('taskNote').value.trim();
  const to = document.getElementById('assignTo').value;
  if (!text || !currentList) return;
  await api('POST', '/tasks', {
    id: Date.now(),
    listId: currentList,
    text, note, to, done: 0
  });
  document.getElementById('taskText').value = '';
  document.getElementById('taskNote').value = '';
  renderTasks();
}

async function toggleTask(id, done) {
  const d = await api('GET', '/tasks', null);
  const t = d.find(x => x.id === id);
  if (t) {
    t.done = done ? 1 : 0;
    await api('PUT', '/tasks/' + id, t);
    renderTasks();
  }
}

// 右键菜单
function showCtx(e, id) {
  e.preventDefault();
  const m = document.getElementById('ctxMenu');
  m.innerHTML = `
    <div class="context-item" onclick="editNote(${id})">修改备注</div>
    <div class="context-item" onclick="delTask(${id})">删除任务</div>
  `;
  m.style.display = 'block';
  m.style.left = e.clientX + 'px';
  m.style.top = e.clientY + 'px';
}

document.onclick = () => document.getElementById('ctxMenu').style.display = 'none';

async function editNote(id) {
  const d = await api('GET', '/tasks', null);
  const t = d.find(x => x.id === id);
  if (!t) return;
  const note = prompt('备注', t.note || '');
  if (note === null) return;
  t.note = note.trim();
  await api('PUT', '/tasks/' + id, t);
  renderTasks();
}

async function delTask(id) {
  if (!confirm('确定删除？')) return;
  await api('DELETE', '/tasks/' + id, null);
  renderTasks();
}

// 员工任务
async function loadMyTasks() {
  const d = await api('GET', '/tasks', null);
  const mine = (d || []).filter(t => t.to === user.name);
  const dom = document.getElementById('allTask');
  dom.innerHTML = `<div class="emp-title">👋 ${user.name} 的任务</div>` + mine.map(t => `
    <div class="task-card">
      <div class="task-text">
        ${t.text}
        ${t.note ? `<div class="task-note">备注：${t.note}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// 切换标签
function showTab(t) {
  document.querySelectorAll('.tab').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.tab-body').forEach(i => i.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(t + 'Task').classList.add('active');
}

// 加载成员
async function loadUserSelect() {
  const users = ['员工A', '员工B', '员工C', '员工D'];
  const sel = document.getElementById('assignTo');
  sel.innerHTML = '<option value="">不分配</option>' + users.map(u =>
    `<option value="${u}">${u}</option>`
  ).join('');
}
</script>
</body>
</html>
